build:
  maxIssues: 0
  excludeCorrectable: true

config:
  validation: true

processors:
  active: true
  exclude:
    - 'DetektProgressListener'

console-reports:
  active: true
  exclude:
    - 'ProjectStatisticsReport'
    - 'ComplexityReport'

style:
  MagicNumber:
    active: false
  WildcardImport:
    active: true
    excludes: ['**/build/**']
  MaxLineLength:
    active: true
    maxLineLength: 140
  UnusedPrivateMember:
    active: true
  ReturnCount:
    active: true
    max: 10
  LoopWithTooManyJumpStatements:
    active: false

exceptions:
  TooGenericExceptionCaught:
    active: false

complexity:
  LargeClass:
    active: true
    threshold: 2000
  LongMethod:
    active: false
    threshold: 80
  CyclomaticComplexMethod:
    active: false
  LongParameterList:
    active: false
  TooManyFunctions:
    active: true
    thresholdInFiles: 30
    thresholdInClasses: 100
    thresholdInInterfaces: 60
    thresholdInObjects: 60
  NestedBlockDepth:
    active: true
    threshold: 7

comments:
  UndocumentedPublicClass:
    active: false
  UndocumentedPublicFunction:
    active: false

